<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Term</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        :root {
            --bg: #1E1E1E;
            --top: #2D2D2D;
            --accent: #007ACC;
            --text: #FFFFFF;
            --border: #3E3E3E;
            --side: #252526;
            --input-bg: #2A2D2E;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #top-bar {
            background-color: var(--top);
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        #tab-bar {
            background-color: #252526;
            display: flex;
            gap: 2px;
            padding: 0 10px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 8px 20px;
            background-color: #2D2D2D;
            font-size: 11px;
            cursor: pointer;
            border-right: 1px solid var(--border);
            color: #999;
            min-width: 80px;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab.active {
            background-color: var(--bg);
            color: white;
            border-bottom: 2px solid var(--accent);
        }
        .tab .close-tab { font-size: 10px; color: #555; }
        .tab .close-tab:hover { color: #f44; }

        .control-group { display: flex; align-items: center; gap: 5px; }
        label { font-size: 10px; text-transform: uppercase; color: #888; }
        select, input {
            background-color: #1E1E1E;
            color: #FFF;
            border: 1px solid #444;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            outline: none;
        }
        select:focus, input:focus { border-color: var(--accent); }

        #main-view {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }
        #terminal-container {
            flex-grow: 1;
            background-color: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .terminal-instance-wrapper {
            flex-grow: 1;
            position: relative;
            visibility: hidden;
            display: none;
        }
        .terminal-instance-wrapper.active {
            visibility: visible;
            display: flex;
            flex-direction: column;
        }
        .terminal-instance { flex-grow: 1; padding: 10px; }
        
        /* Warp-Style Bottom Input */
        .bottom-command-bar {
            background-color: var(--top);
            padding: 8px 15px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .prompt-symbol { color: var(--accent); font-weight: bold; font-family: monospace; }
        .warp-input {
            flex-grow: 1;
            background: var(--input-bg);
            border: none;
            color: white;
            font-family: 'Menlo', 'Monaco', monospace;
            font-size: 13px;
            padding: 5px;
        }

        #side-pane {
            width: 350px;
            background-color: var(--side);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
        }
        #side-pane.collapsed { width: 0; display: none; }
        #side-header {
            padding: 10px;
            background-color: #2D2D2D;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }
        #doc-content {
            padding: 15px;
            font-size: 13px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #CCC;
            line-height: 1.5;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        button:hover { filter: brightness(1.2); }
        .icon-btn { background: none; font-size: 16px; color: #AAA; }
        .icon-btn:hover { color: white; }
        .logo { font-weight: 800; font-size: 14px; color: #4EC9B0; display: flex; align-items: center; gap: 8px; }
        .logo img { width: 18px; height: 18px; border-radius: 3px; }
        
        /* Robust Settings Modal */
        #settings-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1E1E1E;
            border-radius: 12px;
            border: 1px solid var(--border);
            z-index: 100;
            width: 600px;
            height: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }
        #settings-sidebar {
            width: 150px;
            background: #252526;
            border-right: 1px solid var(--border);
            padding: 20px 0;
        }
        .settings-nav-item {
            padding: 10px 20px;
            font-size: 13px;
            cursor: pointer;
            color: #AAA;
        }
        .settings-nav-item.active {
            background: #37373d;
            color: white;
            border-left: 3px solid var(--accent);
        }
        #settings-body { flex-grow: 1; padding: 25px; overflow-y: auto; }
        .settings-section { display: none; }
        .settings-section.active { display: block; }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 99;
        }
        .config-row { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .config-row label { font-size: 11px; color: #888; }
        .config-row input { width: 100%; padding: 8px; background: #2D2D2D; border: 1px solid #444; }
    </style>
</head>
<body>
    <div id="top-bar">
        <div class="logo">
            <img src="assets/icon.png" alt="J">
            JARVIS
        </div>
        <div class="control-group">
            <label>Workspce:</label>
            <input list="workspaces" id="dir-input" placeholder="Search or Type Path..." value="/" style="width: 200px;">
            <datalist id="workspaces"></datalist>
            <button onclick="pinWorkspace()" class="icon-btn" title="Pin Workspace">📌</button>
        </div>
        <button id="add-tab-btn" style="margin-left: 10px;">+ New Session</button>
        
        <div class="control-group" style="margin-left: 15px;">
            <input type="text" id="search-input" placeholder="Search session..." style="width: 120px;" onkeypress="if(event.key==='Enter') searchTerm()">
            <button onclick="searchTerm()" class="icon-btn">🔍</button>
        </div>

        <button onclick="toggleSidePane()" id="toggle-pane-btn" class="icon-btn" style="margin-left: 15px;">📄</button>
        <button class="icon-btn" id="settings-btn" style="margin-left: auto;">⚙️</button>
    </div>
    <div id="tab-bar"></div>
    
    <div id="main-view">
        <div id="terminal-container"></div>
        <div id="side-pane" class="collapsed">
            <div id="side-header">
                <span>Integrated Viewer</span>
                <input type="text" id="doc-path" placeholder="Path to view..." style="width: 180px;" onkeypress="if(event.key==='Enter') loadDoc()">
            </div>
            <div id="doc-content">Drag a file here or type its path above to view...</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeSettings()"></div>
    
    <div id="settings-modal" style="display: none;">
        <div style="display: flex; height: 100%;">
            <div id="settings-sidebar">
                <div class="settings-nav-item active" onclick="showSettingsSection('general', this)">General</div>
                <div class="settings-nav-item" onclick="showSettingsSection('ai', this)">AI Brain</div>
                <div class="settings-nav-item" onclick="showSettingsSection('updates', this)">Updates</div>
            </div>
            <div id="settings-body">
                <div id="section-general" class="settings-section active">
                    <h2 style="margin-top: 0;">General Settings</h2>
                    <div class="config-row">
                        <label>Default Shell</label>
                        <select id="config-shell" style="width: 100%;">
                            <option value="/bin/zsh">ZSH (Recommended)</option>
                            <option value="/bin/bash">BASH</option>
                        </select>
                    </div>
                    <div class="config-row">
                        <label>Auto-Analyze Dropped Files</label>
                        <input type="checkbox" id="config-auto-analyze" checked style="width: 20px;">
                    </div>
                </div>
                
                <div id="section-ai" class="settings-section">
                    <h2 style="margin-top: 0;">AI Brain Configuration</h2>
                    <div class="config-row">
                        <label>Active Provider</label>
                        <select id="config-provider" style="width: 100%;">
                            <option value="ollama">Ollama (Offline)</option>
                            <option value="gemini">Google Gemini</option>
                            <option value="openai">OpenAI</option>
                            <option value="claude">Anthropic Claude</option>
                        </select>
                    </div>
                    <div class="config-row">
                        <label>Primary Model</label>
                        <input type="text" id="config-model" placeholder="e.g. llama3, gpt-4o">
                    </div>
                </div>

                <div id="section-updates" class="settings-section">
                    <h2 style="margin-top: 0;">Software Updates</h2>
                    <p style="font-size: 13px; color: #AAA;">Current Version: <span id="current-version">0.1.2</span></p>
                    <div class="config-row">
                        <label>Check for updates automatically</label>
                        <input type="checkbox" id="config-auto-update" checked style="width: 20px;">
                    </div>
                    <button onclick="checkUpdatesNow()" id="check-update-btn" style="width: 100%; padding: 10px; margin-top: 10px;">Check for Updates Now</button>
                    <div id="update-status" style="margin-top: 15px; font-size: 12px; color: #4EC9B0;"></div>
                </div>
            </div>
        </div>
        <div style="position: absolute; bottom: 15px; right: 25px;">
            <button onclick="closeSettings()" style="background: #444;">Cancel</button>
            <button onclick="saveAllSettings()" style="margin-left: 10px;">Save & Apply</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-search@0.13.0/lib/xterm-addon-search.js"></script>
    <script>
        let tabs = [];
        let activeTabId = null;

        window.addEventListener('pywebviewready', function() {
            createTab();
            
            // Load current config
            pywebview.api.get_config().then(config => {
                if(config.pinned_workspaces) updateWorkspaceList(config.pinned_workspaces);
                
                // Sync settings fields
                document.getElementById('config-shell').value = config.shell || '/bin/zsh';
                document.getElementById('config-provider').value = config.provider || 'ollama';
                document.getElementById('config-model').value = config.jarvis_model || 'llama3';
                document.getElementById('config-auto-update').checked = config.auto_update !== false;
                
                if(config.auto_update !== false) {
                    checkUpdatesNow(true);
                }
            });

            document.getElementById('add-tab-btn').addEventListener('click', () => createTab());
            document.getElementById('settings-btn').addEventListener('click', openSettings);
        });

        function createTab() {
            const id = 'tab-' + Date.now();
            const tabWrapper = document.createElement('div');
            tabWrapper.className = 'terminal-instance-wrapper';
            tabWrapper.id = id;
            
            // Main Terminal area
            const termEl = document.createElement('div');
            termEl.className = 'terminal-instance';
            tabWrapper.appendChild(termEl);

            // Warp-style command bar
            const cmdBar = document.createElement('div');
            cmdBar.className = 'bottom-command-bar';
            cmdBar.innerHTML = `
                <span class="prompt-symbol">JARVIS ></span>
                <input type="text" class="warp-input" placeholder="Type a command or start chatting..." />
            `;
            const warpInput = cmdBar.querySelector('.warp-input');
            warpInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    const cmd = warpInput.value;
                    pywebview.api.write_to_pty(id, cmd + '\r');
                    warpInput.value = '';
                }
            });
            tabWrapper.appendChild(cmdBar);
            
            document.getElementById('terminal-container').appendChild(tabWrapper);

            const tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.id = 'label-' + id;
            tabEl.innerHTML = `<span>Session ${tabs.length + 1}</span><span class="close-tab" onclick="event.stopPropagation(); closeTab('${id}')">✕</span>`;
            tabEl.onclick = () => switchTab(id);
            document.getElementById('tab-bar').appendChild(tabEl);

            const term = new Terminal({
                theme: { background: '#1E1E1E' },
                fontFamily: 'Menlo, Monaco, monospace',
                fontSize: 12,
                cursorBlink: true
            });
            const fitAddon = new FitAddon.FitAddon();
            const searchAddon = new SearchAddon.SearchAddon();
            term.loadAddon(fitAddon);
            term.open(termEl);
            fitAddon.fit();

            term.onData(data => {
                pywebview.api.write_to_pty(id, data);
            });

            // Auto-start in zsh and launch jarvis
            const shell = document.getElementById('config-shell').value || '/bin/zsh';
            const dir = document.getElementById('dir-input').value;
            pywebview.api.start_terminal(id, dir, shell).then(() => {
                // Wait for shell to load then start jarvis
                setTimeout(() => {
                    pywebview.api.write_to_pty(id, 'jarvis\r');
                }, 500);
            });

            tabs.push({ id, term, fitAddon, searchAddon });
            switchTab(id);
        }

        function switchTab(id) {
            tabs.forEach(t => {
                document.getElementById(t.id).classList.remove('active');
                document.getElementById('label-' + t.id).classList.remove('active');
            });
            const activeWrap = document.getElementById(id);
            if(activeWrap) {
                activeWrap.classList.add('active');
                document.getElementById('label-' + id).classList.add('active');
                activeTabId = id;
                const activeTab = tabs.find(t => t.id === id);
                setTimeout(() => {
                    activeTab.fitAddon.fit();
                    pywebview.api.resize_pty(id, activeTab.term.cols, activeTab.term.rows);
                }, 10);
            }
        }

        function closeTab(id) {
            const index = tabs.findIndex(t => t.id === id);
            if(index > -1) {
                document.getElementById(id).remove();
                document.getElementById('label-' + id).remove();
                tabs.splice(index, 1);
                if(activeTabId === id && tabs.length > 0) {
                    switchTab(tabs[tabs.length-1].id);
                } else if(tabs.length === 0) {
                    createTab();
                }
            }
        }

        function openSettings() {
            document.getElementById('settings-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function showSettingsSection(name, el) {
            document.querySelectorAll('.settings-nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.settings-section').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('section-' + name).classList.add('active');
        }

        function saveAllSettings() {
            const config = {
                shell: document.getElementById('config-shell').value,
                provider: document.getElementById('config-provider').value,
                jarvis_model: document.getElementById('config-model').value,
                auto_update: document.getElementById('config-auto-update').checked
            };
            pywebview.api.save_config(config).then(() => {
                alert("Settings saved successfully!");
                closeSettings();
            });
        }

        function checkUpdatesNow(silent = false) {
            const statusEl = document.getElementById('update-status');
            if(!silent) statusEl.innerText = "Checking GitHub for updates...";
            
            pywebview.api.check_updates().then(res => {
                document.getElementById('current-version').innerText = res.current;
                if(res.latest > res.current) {
                    statusEl.innerHTML = `New version available: <b>v${res.latest}</b>. <a href="#" onclick="runUpdateNow()" style="color: #007ACC;">Update Now</a>`;
                    if(!silent) alert("A new version of JARVIS is available!");
                } else {
                    if(!silent) statusEl.innerText = "You are running the latest version.";
                }
            });
        }

        function runUpdateNow() {
            if(confirm("JARVIS will pull the latest code and restart. Continue?")) {
                pywebview.api.run_update().then(res => {
                    alert(res === true ? "Update successful! JARVIS will now restart." : res);
                });
            }
        }

        function pinWorkspace() {
            const path = document.getElementById('dir-input').value;
            pywebview.api.add_pinned_workspace(path).then(pinned => updateWorkspaceList(pinned));
        }

        function updateWorkspaceList(pinned) {
            const dl = document.getElementById('workspaces');
            dl.innerHTML = '';
            pinned.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                dl.appendChild(opt);
            });
        }

        function searchTerm() {
            const query = document.getElementById('search-input').value;
            const activeTab = tabs.find(t => t.id === activeTabId);
            if(activeTab && query) activeTab.searchAddon.findNext(query);
        }

        function loadDoc() {
            const path = document.getElementById('doc-path').value;
            pywebview.api.read_file(path).then(content => {
                document.getElementById('doc-content').innerText = content;
            });
        }

        function toggleSidePane() {
            const pane = document.getElementById('side-pane');
            pane.classList.toggle('collapsed');
            const activeTab = tabs.find(t => t.id === activeTabId);
            if(activeTab) {
                setTimeout(() => {
                    activeTab.fitAddon.fit();
                    pywebview.api.resize_pty(activeTabId, activeTab.term.cols, activeTab.term.rows);
                }, 300);
            }
        }

        function writeToTerminal(id, data) {
            const tab = tabs.find(t => t.id === id);
            if(tab) tab.term.write(data);
        }
    </script>
</body>
</html>
