<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Term | Engineering Console</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        :root {
            --bg: #0A0A0A;
            --top: rgba(20, 20, 20, 0.8);
            --accent: #00F0FF; /* Vibrant Cyan */
            --accent-glow: rgba(0, 240, 255, 0.3);
            --text: #F0F0F0;
            --border: #333333;
            --side: #111111;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: "SF Pro Text", "Helvetica Neue", sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
        }
        #top-bar {
            background: var(--top);
            backdrop-filter: blur(20px);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 25px;
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }
        #tab-bar {
            background: rgba(10, 10, 10, 0.5);
            display: flex;
            gap: 5px;
            padding: 8px 15px 0 15px;
            border-bottom: 1px solid var(--border);
            height: 45px;
            align-items: flex-end;
        }
        .tab {
            padding: 10px 25px;
            background: var(--glass);
            font-size: 13px;
            cursor: pointer;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            color: #777;
            min-width: 140px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            border: 1px solid var(--glass-border);
            border-bottom: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab.active {
            background: rgba(0, 240, 255, 0.1);
            color: white;
            border-top: 2px solid var(--accent);
            box-shadow: inset 0 0 10px var(--accent-glow);
            font-weight: 700;
        }
        .tab:hover { background: rgba(255,255,255,0.1); color: #AAA; }
        
        .control-group { display: flex; align-items: center; gap: 12px; }
        
        select, input {
            background: #000;
            color: #FFF;
            border: 1px solid #444;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        #main-view { display: flex; flex-grow: 1; overflow: hidden; }
        #terminal-container { flex-grow: 1; position: relative; display: flex; flex-direction: column; background: #000; }
        
        .terminal-instance-wrapper { flex-grow: 1; display: none; flex-direction: column; position: relative; }
        .terminal-instance-wrapper.active { display: flex; }
        .terminal-instance { flex-grow: 1; padding: 20px; }
        
        /* GEMINI/WARP STYLE INPUT */
        .bottom-command-bar {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(30px);
            padding: 20px 40px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .warp-input-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            padding: 5px 20px;
            border-radius: 12px;
            transition: border 0.3s;
        }
        .warp-input-container:focus-within { border-color: var(--accent); }
        .prompt-symbol { color: var(--accent); font-weight: 900; font-size: 18px; text-shadow: 0 0 10px var(--accent-glow); }
        .warp-input {
            flex-grow: 1;
            background: transparent;
            border: none !important;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            padding: 12px 0;
            box-shadow: none !important;
        }

        #side-pane {
            width: 450px;
            background: rgba(10, 10, 10, 0.95);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
        }
        #side-pane.collapsed { width: 0; opacity: 0; visibility: hidden; }
        #side-header {
            padding: 20px;
            background: var(--glass);
            border-bottom: 1px solid var(--glass-border);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }
        #doc-content {
            padding: 30px;
            font-size: 14px;
            overflow-y: auto;
            color: #DDD;
            line-height: 1.8;
            font-family: 'JetBrains Mono', monospace;
        }

        .icon-btn { 
            background: var(--glass); 
            font-size: 20px; color: #888; 
            border: 1px solid var(--glass-border); 
            padding: 10px; cursor: pointer; 
            border-radius: 10px;
            transition: all 0.2s;
        }
        .icon-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(0, 240, 255, 0.1); }
        
        .logo { font-weight: 900; font-size: 22px; color: white; display: flex; align-items: center; gap: 15px; }
        .logo span { color: var(--accent); }
        
        /* Modals Glassmorphism */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(40px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            z-index: 1000;
            width: 800px; height: 600px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            flex-direction: column;
            overflow: hidden;
        }
        .modal.open { display: flex; }
        .modal-sidebar { width: 220px; background: rgba(0,0,0,0.3); border-right: 1px solid var(--glass-border); padding: 50px 0; }
        .nav-item { padding: 18px 40px; font-size: 16px; cursor: pointer; color: #555; transition: 0.3s; }
        .nav-item.active { color: var(--accent); border-right: 3px solid var(--accent); font-weight: 800; background: rgba(0,240,255,0.05); }
        .modal-body { flex-grow: 1; padding: 60px; overflow-y: auto; }
        
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); z-index: 999;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .loading-ring {
            width: 20px; height: 20px;
            border: 2px solid var(--glass-border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body ondragover="event.preventDefault()" ondrop="handleDrop(event)">
    <div id="top-bar">
        <div class="logo">
            <span>J</span>ARVIS
        </div>
        <div class="control-group">
            <input list="workspaces" id="dir-input" placeholder="Jump to directory..." value="" style="width: 350px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);">
            <datalist id="workspaces"></datalist>
            <button onclick="pinWorkspace()" class="icon-btn" title="Pin Workspace">📌</button>
        </div>
        
        <div class="control-group" style="margin-left: auto;">
            <div id="global-status" style="font-size: 12px; color: #555; font-weight: 700; letter-spacing: 1px;">SYSTEM READY</div>
        </div>

        <button onclick="toggleSidePane()" id="toggle-pane-btn" class="icon-btn" title="Viewer">📄</button>
        <button class="icon-btn" id="settings-btn" onclick="openSettings()" title="Settings">⚙️</button>
    </div>
    
    <div id="tab-bar">
        <button onclick="createTab()" style="background:none; border:none; color:var(--accent); padding: 5px 20px; font-size: 30px; cursor:pointer;">+</button>
    </div>
    
    <div id="main-view">
        <div id="terminal-container"></div>
        <div id="side-pane" class="collapsed">
            <div id="side-header">
                Engineering Viewer
            </div>
            <div id="doc-content">Drop files here to analyze.</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>
    
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div style="display: flex; height: 100%;">
            <div class="modal-sidebar">
                <div class="nav-item active" onclick="showSection('general', this)">Identity</div>
                <div class="nav-item" onclick="showSection('ai', this)">Intelligence</div>
                <div class="nav-item" onclick="showSection('updates', this)">Core Build</div>
            </div>
            <div class="modal-body">
                <div id="section-general" class="section active">
                    <h1 style="margin-top: 0; font-weight: 900; font-size: 32px;">Identity</h1>
                    <p style="color: #666; margin-bottom: 40px;">Configure your assistant's behavioral profile.</p>
                    <div style="margin-bottom: 30px;">
                        <label style="display:block; margin-bottom: 10px; font-size: 12px; color: #888; font-weight: 900; text-transform: uppercase;">Primary Shell</label>
                        <select id="config-shell" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);">
                            <option value="/bin/zsh">ZSH (Advanced)</option>
                            <option value="/bin/bash">BASH (Legacy)</option>
                            <option value="/usr/bin/python3">Python Runtime</option>
                        </select>
                    </div>
                </div>
                
                <div id="section-ai" class="section" style="display:none;">
                    <h1 style="margin-top: 0; font-weight: 900; font-size: 32px; color: var(--accent);">Intelligence</h1>
                    <div style="margin-bottom: 30px;">
                        <label style="display:block; margin-bottom: 10px; font-size: 12px; color: #888;">AI PROVIDER</label>
                        <select id="config-provider" style="width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid #333;">
                            <option value="ollama">Ollama (Offline/Sovereign)</option>
                            <option value="gemini">Google Gemini Pro</option>
                            <option value="openai">OpenAI</option>
                            <option value="anthropic">Anthropic Claude</option>
                            <option value="mistral">Mistral</option>
                            <option value="deepseek">DeepSeek</option>
                            <option value="kimi">Kimi / Moonshot</option>
                            <option value="qwen">Qwen</option>
                            <option value="nvidia">NVIDIA / Nemotron</option>
                            <option value="perplexity">Perplexity</option>
                            <option value="groq">Groq</option>
                            <option value="stability">Stability AI</option>
                            <option value="cohere">Cohere</option>
                            <option value="replicate">Replicate</option>
                            <option value="together">Together AI</option>
                            <option value="openrouter">OpenRouter</option>
                            <option value="granite">IBM Granite</option>
                            <option value="replit">Replit Agent</option>
                        </select>
                    </div>
                    <div>
                        <label style="display:block; margin-bottom: 10px; font-size: 12px; color: #888;">MODEL ID</label>
                        <input type="text" id="config-model" style="width: 95%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid #333;">
                    </div>
                </div>

                <div id="section-updates" class="section" style="display:none;">
                    <h1 style="margin-top: 0; font-weight: 900; font-size: 32px; color: #FFD700;">Core Build</h1>
                    <p style="color: #666;" id="core-version">Version loading... | Engineering Console</p>
                    <button onclick="checkUpdatesNow()" style="width: 100%; padding: 20px; margin-top: 40px; background: var(--accent); color: black;">SCAN FOR UPGRADES</button>
                    <div id="update-status" style="margin-top: 30px; font-weight: 700; color: var(--accent);"></div>
                </div>
            </div>
        </div>
        <div style="padding: 30px 60px; background: rgba(0,0,0,0.5); border-top: 1px solid var(--glass-border); display: flex; justify-content: flex-end; gap: 25px;">
            <button onclick="closeSettings()" style="background: transparent; color: #555; border: 1px solid #333;">DISCARD</button>
            <button onclick="saveAllSettings()" style="background: white; color: black; padding: 12px 30px;">APPLY CHANGES</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-search@0.13.0/lib/xterm-addon-search.js"></script>
    <script>
        let tabs = [];
        let activeTabId = null;

        function createTab() {
            const id = 'tab-' + Date.now();
            const tabWrapper = document.createElement('div');
            tabWrapper.className = 'terminal-instance-wrapper';
            tabWrapper.id = id;
            
            const termEl = document.createElement('div');
            termEl.className = 'terminal-instance';
            tabWrapper.appendChild(termEl);

            const cmdBar = document.createElement('div');
            cmdBar.className = 'bottom-command-bar';
            cmdBar.innerHTML = `
                <div id="workspace-info-${id}" style="font-size: 11px; color: var(--accent); margin-bottom: 8px; font-family: monospace; letter-spacing: 1px; font-weight: 800;">ISOLATING CONTEXT...</div>
                <div class="warp-input-container">
                    <span class="prompt-symbol">JARVIS ></span>
                    <input type="text" class="warp-input" placeholder="Type command, path, or request..." />
                    <div id="spinner-${id}" class="loading-ring" style="display:none;"></div>
                </div>
            `;
            
            setInterval(() => {
                const infoBox = document.getElementById(`workspace-info-${id}`);
                if(infoBox) {
                    pywebview.api.get_cwd(id).then(cwd => {
                        infoBox.innerText = `📁 WORKSPACE: ${cwd}`;
                    });
                }
            }, 3000);

            const warpInput = cmdBar.querySelector('.warp-input');
            const spinner = cmdBar.querySelector('.loading-ring');
            
            warpInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    const cmd = warpInput.value;
                    spinner.style.display = 'block';
                    pywebview.api.write_to_pty(id, cmd + '\r').then(() => {
                        warpInput.value = '';
                        setTimeout(() => { spinner.style.display = 'none'; }, 1000);
                    });
                }
            });
            tabWrapper.appendChild(cmdBar);
            document.getElementById('terminal-container').appendChild(tabWrapper);

            const tabLabel = document.createElement('div');
            tabLabel.className = 'tab';
            tabLabel.id = 'label-' + id;
            tabLabel.innerHTML = `<span>SESSION ${tabs.length + 1}</span><span class="close-tab" onclick="event.stopPropagation(); closeTab('${id}')">✕</span>`;
            tabLabel.onclick = () => switchTab(id);
            document.getElementById('tab-bar').appendChild(tabLabel);

            const term = new Terminal({
                theme: { background: '#000000', cursor: '#00F0FF', foreground: '#FFFFFF' },
                fontFamily: '"JetBrains Mono", "SF Mono", monospace',
                fontSize: 14,
                cursorBlink: true,
                cursorStyle: 'block'
            });
            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(termEl);
            fitAddon.fit();

            term.onData(data => pywebview.api.write_to_pty(id, data));

            pywebview.api.get_config().then(config => {
                const shell = config.shell || '/bin/zsh';
                const dir = document.getElementById('dir-input').value || '~';
                pywebview.api.start_terminal(id, dir, shell).then(() => {
                    pywebview.api.get_jarvis_launch_command().then(cmd => {
                        setTimeout(() => pywebview.api.write_to_pty(id, cmd + '\r'), 600);
                    });
                });
            });

            tabs.push({ id, term, fitAddon });
            switchTab(id);
        }

        function switchTab(id) {
            tabs.forEach(t => {
                document.getElementById(t.id).classList.remove('active');
                document.getElementById('label-' + t.id).classList.remove('active');
            });
            const activeWrap = document.getElementById(id);
            if(activeWrap) {
                activeWrap.classList.add('active');
                document.getElementById('label-' + id).classList.add('active');
                activeTabId = id;
                const activeTab = tabs.find(t => t.id === id);
                setTimeout(() => {
                    activeTab.fitAddon.fit();
                    activeTab.term.focus();
                }, 50);
            }
        }

        function closeTab(id) {
            const index = tabs.findIndex(t => t.id === id);
            if(index > -1) {
                document.getElementById(id).remove();
                document.getElementById('label-' + id).remove();
                tabs.splice(index, 1);
                if(activeTabId === id && tabs.length > 0) switchTab(tabs[tabs.length-1].id);
                else if(tabs.length === 0) createTab();
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if(files.length > 0) {
                const path = files[0].path;
                pywebview.api.write_to_pty(activeTabId, `/analyze-file ${path}\r`);
            }
        }

        function openSettings() {
            document.getElementById('settings-modal').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
            pywebview.api.get_config().then(config => {
                document.getElementById('config-shell').value = config.shell || '/bin/zsh';
                document.getElementById('config-provider').value = config.provider || 'ollama';
                document.getElementById('config-model').value = config.jarvis_model || '';
            });
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }

        function closeAllModals() {
            closeSettings();
        }

        function showSection(name, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            el.classList.add('active');
            document.getElementById('section-' + name).style.display = 'block';
        }

        function saveAllSettings() {
            pywebview.api.get_config().then(config => {
                config.shell = document.getElementById('config-shell').value;
                config.provider = document.getElementById('config-provider').value;
                config.jarvis_model = document.getElementById('config-model').value;
                pywebview.api.save_config(config).then(() => closeSettings());
            });
        }

        function toggleSidePane() {
            document.getElementById('side-pane').classList.toggle('collapsed');
        }

        // Minimal renderer for the "ui" object (Gemini-Style Cards)
        function renderCard(ui, id) {
            if (!ui) return;
            const tabWrapper = document.getElementById(id);
            const card = document.createElement('div');
            card.style.cssText = `
                border: 1px solid var(--glass-border);
                border-radius: 12px;
                padding: 20px;
                background: rgba(255, 255, 255, 0.05);
                margin: 20px 40px;
                backdrop-filter: blur(10px);
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                font-family: 'Inter', sans-serif;
            `;

            if (ui.title) {
                const t = document.createElement('div');
                t.style.cssText = "font-weight: 800; font-size: 18px; color: var(--accent); margin-bottom: 5px;";
                t.textContent = ui.title;
                card.appendChild(t);
            }
            if (ui.subtitle) {
                const s = document.createElement('div');
                s.style.cssText = "color: #888; font-size: 13px; margin-bottom: 15px; font-weight: 600;";
                s.textContent = ui.subtitle;
                card.appendChild(s);
            }
            if (ui.markdown) {
                const m = document.createElement('div');
                m.style.cssText = "color: #DDD; font-size: 14px; margin-bottom: 20px; line-height: 1.6;";
                m.innerHTML = ui.markdown.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.5); padding:2px 6px; border-radius:4px;">$1</code>').replace(/\n/g, '<br/>');
                card.appendChild(m);
            }

            const btnRow = document.createElement('div');
            btnRow.style.cssText = "display: flex; gap: 12px;";
            (ui.buttons || []).slice(0,3).forEach((b) => {
                const btn = document.createElement('button');
                btn.style.cssText = `
                    padding: 10px 20px;
                    border-radius: 8px;
                    border: 1px solid ${b.primary ? 'var(--accent)' : '#444'};
                    background: ${b.primary ? 'rgba(0, 240, 255, 0.1)' : 'transparent'};
                    color: ${b.primary ? 'var(--accent)' : '#AAA'};
                    cursor: pointer;
                    font-size: 13px;
                    font-weight: 700;
                    transition: 0.3s;
                `;
                btn.textContent = b.label;
                btn.onmouseenter = () => btn.style.background = 'rgba(0, 240, 255, 0.2)';
                btn.onmouseleave = () => btn.style.background = b.primary ? 'rgba(0, 240, 255, 0.1)' : 'transparent';
                
                btn.addEventListener('click', () => {
                    // Send specific command back to terminal based on action
                    if(b.action === 'run' || b.action === 'confirm') {
                        pywebview.api.write_to_pty(id, '\r'); // Just hit enter if it's already staged or needs confirm
                    } else if(b.action === 'help') {
                        pywebview.api.write_to_pty(id, '/help\r');
                    }
                    card.remove(); // Dismiss after click
                });
                btnRow.appendChild(btn);
            });
            card.appendChild(btnRow);
            
            // Insert before the command bar
            const cmdBar = tabWrapper.querySelector('.bottom-command-bar');
            tabWrapper.insertBefore(card, cmdBar);
        }

        window.addEventListener('pywebviewready', () => {
            pywebview.api.get_home().then(home => {
                document.getElementById('dir-input').value = home;
            });
            pywebview.api.get_jarvis_info().then(info => {
                document.getElementById('global-status').innerText = `JARVIS ${info.version} • ${info.provider.toUpperCase()}`;
                document.getElementById('core-version').innerText = `Version ${info.version} | Engineering Console`;
            });
            createTab();
        });
    </script>
</body>
</html>
