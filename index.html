<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Term</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        :root {
            --bg: #1E1E1E;
            --top: #2D2D2D;
            --accent: #007ACC;
            --text: #FFFFFF;
            --border: #3E3E3E;
            --side: #252526;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #top-bar {
            background-color: var(--top);
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        #tab-bar {
            background-color: #252526;
            display: flex;
            gap: 2px;
            padding: 0 10px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 8px 20px;
            background-color: #2D2D2D;
            font-size: 11px;
            cursor: pointer;
            border-right: 1px solid var(--border);
            color: #999;
            min-width: 80px;
            text-align: center;
        }
        .tab.active {
            background-color: var(--bg);
            color: white;
            border-bottom: 2px solid var(--accent);
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        label {
            font-size: 10px;
            text-transform: uppercase;
            color: #888;
        }
        select, input {
            background-color: #1E1E1E;
            color: #FFF;
            border: 1px solid #444;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        #main-view {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }
        #terminal-container {
            flex-grow: 1;
            background-color: var(--bg);
            position: relative;
        }
        #side-pane {
            width: 300px;
            background-color: var(--side);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
        }
        #side-pane.collapsed {
            width: 0;
            display: none;
        }
        #side-header {
            padding: 10px;
            background-color: #2D2D2D;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }
        #doc-content {
            padding: 15px;
            font-size: 13px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #CCC;
            line-height: 1.5;
        }
        .terminal-instance {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 10px;
            visibility: hidden;
        }
        .terminal-instance.active {
            visibility: visible;
        }
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .icon-btn {
            background: none;
            font-size: 16px;
            color: #AAA;
        }
        .icon-btn:hover { color: white; }
        .logo { font-weight: 800; font-size: 14px; color: #4EC9B0; }
        
        #settings-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #2D2D2D;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            z-index: 100;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 99;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <div class="logo">JARVIS TERM</div>
        <div class="control-group">
            <label>Env:</label>
            <select id="env-select">
                <option value="/bin/zsh">ZSH</option>
                <option value="/bin/bash">BASH</option>
                <option value="/usr/local/bin/jarvis">JARVIS CLI</option>
            </select>
        </div>
        <div class="control-group">
            <label>Model:</label>
            <select id="model-select" onchange="updateModel(this.value)">
                <option value="llama3">Llama 3 (Local)</option>
                <option value="gemini-1.5-flash">Gemini Flash (Free)</option>
                <option value="gemini-1.5-pro">Gemini Pro</option>
                <option value="claude-3-5-sonnet-20240620">Claude 3.5 Sonnet</option>
                <option value="gpt-4o">GPT-4o</option>
            </select>
        </div>
        <input type="text" id="dir-input" placeholder="Path..." value="/" style="width: 150px;">
        <button id="add-tab-btn">+ Tab</button>
        <button onclick="toggleSidePane()" id="toggle-pane-btn" class="icon-btn">📄</button>
        <button class="icon-btn" id="settings-btn" style="margin-left: auto;">⚙</button>
    </div>
    <div id="tab-bar"></div>
    
    <div id="main-view">
        <div id="terminal-container"></div>
        <div id="side-pane" class="collapsed">
            <div id="side-header">
                <span>Document Viewer</span>
                <input type="text" id="doc-path" placeholder="Read file (e.g. README.md)" style="width: 150px;" onkeypress="if(event.key==='Enter') loadDoc()">
            </div>
            <div id="doc-content">Enter a path above to view a file...</div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="settings-modal">
        <h3>Jarvis Term Settings</h3>
        <hr style="border: 0; border-top: 1px solid #444; margin-bottom: 15px;">
        <p style="font-size: 12px; color: #AAA;">Configuring global Jarvis behavior...</p>
        <button style="width: 100%; margin-top: 20px;" onclick="closeSettings()">Close</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script>
        let tabs = [];
        let activeTabId = null;

        window.addEventListener('pywebviewready', function() {
            createTab();
            
            // Load current config
            pywebview.api.get_config().then(config => {
                if(config.jarvis_model) {
                    document.getElementById('model-select').value = config.jarvis_model;
                }
            });

            document.getElementById('add-tab-btn').addEventListener('click', () => createTab());
            document.getElementById('settings-btn').addEventListener('click', () => {
                document.getElementById('settings-modal').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            });
        });

        function updateModel(val) {
            pywebview.api.save_config_field('jarvis_model', val).then(() => {
                console.log("Model updated to " + val);
            });
        }

        function toggleSidePane() {
            const pane = document.getElementById('side-pane');
            pane.classList.toggle('collapsed');
            // Resize terminal when pane toggles
            const activeTab = tabs.find(t => t.id === activeTabId);
            if(activeTab) {
                setTimeout(() => {
                    activeTab.fitAddon.fit();
                    pywebview.api.resize_pty(activeTabId, activeTab.term.cols, activeTab.term.rows);
                }, 300);
            }
        }

        function loadDoc() {
            const path = document.getElementById('doc-path').value;
            pywebview.api.read_file(path).then(content => {
                document.getElementById('doc-content').innerText = content;
            });
        }

        function createTab() {
            const id = 'tab-' + Date.now();
            const tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.id = 'label-' + id;
            tabEl.innerText = 'Wkspace ' + (tabs.length + 1);
            tabEl.onclick = () => switchTab(id);
            document.getElementById('tab-bar').appendChild(tabEl);

            const container = document.createElement('div');
            container.className = 'terminal-instance';
            container.id = id;
            document.getElementById('terminal-container').appendChild(container);

            const term = new Terminal({
                theme: { background: '#1E1E1E' },
                fontFamily: 'Menlo, Monaco, monospace',
                fontSize: 12,
                cursorBlink: true
            });
            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(container);
            fitAddon.fit();

            term.onData(data => {
                pywebview.api.write_to_pty(id, data);
            });

            const env = document.getElementById('env-select').value;
            const dir = document.getElementById('dir-input').value;
            
            pywebview.api.start_terminal(id, dir, env);

            tabs.push({ id, term, fitAddon });
            switchTab(id);
        }

        function switchTab(id) {
            tabs.forEach(t => {
                document.getElementById(t.id).classList.remove('active');
                document.getElementById('label-' + t.id).classList.remove('active');
            });
            document.getElementById(id).classList.add('active');
            document.getElementById('label-' + id).classList.add('active');
            activeTabId = id;
            
            const activeTab = tabs.find(t => t.id === id);
            setTimeout(() => {
                activeTab.fitAddon.fit();
                pywebview.api.resize_pty(id, activeTab.term.cols, activeTab.term.rows);
            }, 10);
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function writeToTerminal(id, data) {
            const tab = tabs.find(t => t.id === id);
            if(tab) tab.term.write(data);
        }
    </script>
</body>
</html>
