<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Term</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1E1E1E;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #top-bar {
            background-color: #2D2D2D;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #3E3E3E;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #AAAAAA;
        }
        select, input {
            background-color: #1E1E1E;
            color: #FFF;
            border: 1px solid #444;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        select:focus, input:focus {
            border-color: #007ACC;
        }
        #terminal-container {
            flex-grow: 1;
            padding: 10px;
            background-color: #1E1E1E;
            overflow: hidden;
        }
        button {
            background-color: #007ACC;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        button:hover {
            background-color: #005A9E;
        }
        .logo {
            font-weight: 800;
            font-size: 16px;
            color: #4EC9B0;
            margin-right: auto;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <div class="logo">JARVIS TERM</div>
        <div class="control-group">
            <label>Env:</label>
            <select id="env-select">
                <option value="/bin/zsh">ZSH</option>
                <option value="/bin/bash">BASH</option>
                <option value="/usr/local/bin/jarvis">JARVIS CLI</option>
            </select>
        </div>
        <div class="control-group">
            <label>Dir:</label>
            <input type="text" id="dir-input" value="/" style="width: 250px;">
        </div>
        <button id="start-btn">Launch</button>
    </div>
    <div id="terminal-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script>
        let term;
        let fitAddon;

        window.addEventListener('pywebviewready', function() {
            term = new Terminal({
                theme: { background: '#1E1E1E' },
                fontFamily: 'Menlo, Monaco, "Courier New", monospace',
                fontSize: 14,
                cursorBlink: true
            });
            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(document.getElementById('terminal-container'));
            fitAddon.fit();

            term.onData(data => {
                pywebview.api.write_to_pty(data);
            });

            window.addEventListener('resize', () => {
                fitAddon.fit();
                pywebview.api.resize_pty(term.cols, term.rows);
            });

            document.getElementById('start-btn').addEventListener('click', () => {
                const env = document.getElementById('env-select').value;
                const dir = document.getElementById('dir-input').value;
                term.clear();
                pywebview.api.start_terminal(dir, env).then(() => {
                    setTimeout(() => {
                        fitAddon.fit();
                        pywebview.api.resize_pty(term.cols, term.rows);
                    }, 100);
                });
            });
            
            // Auto start default env
            setTimeout(() => {
                document.getElementById('start-btn').click();
            }, 500);
        });

        // Called from Python
        function writeToTerminal(data) {
            if(term) term.write(data);
        }
    </script>
</body>
</html>
